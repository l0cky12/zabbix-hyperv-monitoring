    tags:
    - tag: class
      value: virtualization
    - tag: target
      value: hyper-v
    macros:
    - macro: '{$HYPERV.COLLECT.INTERVAL}'
      value: 1m
      description: Master collection interval.
    - macro: '{$HYPERV.COLLECT.NODATA}'
      value: 5m
      description: No-data duration before collector unavailable alert.
    - macro: '{$HYPERV.HOST.PROBLEM.TIME}'
      value: 3m
      description: Host condition persistence.
    - macro: '{$HYPERV.VM.STOPPED.WARN}'
      value: 15m
      description: Duration an Off VM may remain off before warning.
    - macro: '{$HYPERV.VM.HEARTBEAT.TIME}'
      value: 3m
      description: Running VM heartbeat failure persistence.
    - macro: '{$HYPERV.VM.UPTIME.MIN}'
      value: 10m
      description: Maximum uptime for restart event; used with detected uptime decrease.
    - macro: '{$HYPERV.CHECKPOINT.COUNT.WARN}'
      value: '2'
      description: Maximum checkpoint count before warning.
    - macro: '{$HYPERV.CHECKPOINT.AGE.WARN}'
      value: 7d
      description: Maximum checkpoint age.
    - macro: '{$HYPERV.REPLICA.WARNING.TIME}'
      value: 10m
      description: Persistence for warning replication state/health.
    - macro: '{$HYPERV.REPLICA.CRITICAL.TIME}'
      value: 5m
      description: Persistence for critical replication state/health.
    - macro: '{$HYPERV.REPLICA.LAG.WARN}'
      value: 10m
      description: Extra lag tolerance beyond twice configured frequency.
    - macro: '{$HYPERV.REPLICA.LAG.CRIT}'
      value: 30m
      description: Critical extra lag tolerance beyond twice configured frequency.
